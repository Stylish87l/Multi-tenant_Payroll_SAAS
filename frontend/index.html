<!DOCTYPE html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Paylio | Secure Multi-Tenant HR</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color for light and dark -->
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />

    <!-- Mobile / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paylio" />

    <!-- Social -->
    <meta name="description" content="Modern, compliant payroll system for enterprises. Secure, real-time, and mobile-ready." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Paylio" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="icon" href="/android-chrome-192x192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/android-chrome-512x512.png" sizes="512x512" type="image/png" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Minimal inline styles to show a safe initial loader and avoid FOUC -->
    <style>
      :root { color-scheme: light dark; }
      html,body,#root { height:100%; margin:0; }
      #root:empty {
        background: #020617;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        width:100%;
      }
      #root:empty::after {
        content:"";
        width:40px;
        height:40px;
        border:3px solid #10b981;
        border-top-color:transparent;
        border-radius:50%;
        animation: spin 1s linear infinite;
        box-sizing:border-box;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #root:empty::after { animation: none; }
      }
    </style>
  </head>

  <body class="bg-slate-50 dark:bg-slate-950">
    <noscript>
      <div style="padding:2rem;text-align:center;">
        <h1 style="margin:0 0 .5rem 0;font-size:1.25rem;">JavaScript Required</h1>
        <p style="margin:0;color:#6b7280;">Please enable JavaScript to use the Paylio system.</p>
      </div>
    </noscript>

    <div id="root" aria-live="polite" aria-busy="true"></div>

    <!-- Main entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
